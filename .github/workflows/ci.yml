name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, "base/ccresdoc-zudo-doc-rewrite"]
  push:
    branches: [main, "base/ccresdoc-zudo-doc-rewrite"]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      # Exclude the src-tauri crate (`ccresdoc`) from Linux CI: tauri v2 pulls
      # in webkit2gtk / gtk3 system libs that aren't on ubuntu-latest by default.
      # The Tauri host is verified locally via `cargo tauri build` (mac-only).
      # The only library crate is `ccresdoc-claude-md` (the ~/.claude→MDX
      # generator + watcher); it is pure Rust and runs cleanly on any platform.
      - name: cargo clippy --workspace --exclude ccresdoc --all-targets
        run: cargo clippy --workspace --exclude ccresdoc --all-targets

      - name: cargo test --workspace --exclude ccresdoc
        run: cargo test --workspace --exclude ccresdoc

# NOTE: `zfb build` (app/ frontend) is deferred from CI (v1).
#
# The app build requires the `zfb` Rust binary — installed from
# $HOME/repos/myoss/zfb, which is a separate private repo not available
# on CI runners. The Rust checks (fmt + clippy + test) cover the core
# library code. The app build is verified locally via `bash scripts/run-b4push.sh`
# (which runs `pnpm install` then `pnpm exec zfb build`) before every push,
# and is exercised end-to-end by `cargo tauri build` before each release.
# Re-enable once zfb is published to crates.io.
