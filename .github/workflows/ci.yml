name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, "base/ccresdoc-zfb-restructure"]
  push:
    branches: [main, "base/ccresdoc-zfb-restructure"]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      # Exclude the src-tauri crate (`ccresdoc`) from Linux CI: tauri v2 pulls
      # in webkit2gtk / gtk3 system libs that aren't on ubuntu-latest by default.
      # The Tauri shell is verified locally via `cargo tauri build` (mac-only v1)
      # and `cargo tauri dev`. The library crates (ccresdoc-{resources,renderer,server})
      # are pure Rust and run cleanly on any platform.
      - name: cargo clippy --workspace --exclude ccresdoc --all-targets
        run: cargo clippy --workspace --exclude ccresdoc --all-targets

      - name: cargo test --workspace --exclude ccresdoc
        run: cargo test --workspace --exclude ccresdoc

# NOTE: App build deferred from CI.
#
# Locally exercised via `bash scripts/run-b4push.sh` and `cargo tauri build`.
# Re-enable on CI once zfb is published to crates.io and the GitHub runner
# can `cargo install zfb`.
